services:
  predict-api:
    build:
      context: ./eternareturn_DB
    restart: unless-stopped
    environment:
      DB_HOST: ${RDS_HOST}
      DB_PORT: ${RDS_PORT:-3306}
      DB_USER: ${RDS_USERNAME}
      DB_PASSWORD: ${RDS_PASSWORD}
      DB_NAME: ${RDS_DATABASE}

  backend:
    build:
      context: ./ER_server/ER_server
    restart: unless-stopped
    environment:
      MYSQL_URL: jdbc:mysql://${RDS_HOST}:${RDS_PORT:-3306}/${RDS_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&sslMode=PREFERRED
      MYSQL_USERNAME: ${RDS_USERNAME}
      MYSQL_PASSWORD: ${RDS_PASSWORD}
      BSER_API_KEY: ${BSER_API_KEY}
      PREDICT_API_BASE_URL: http://predict-api:8000
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    depends_on:
      predict-api:
        condition: service_started

  frontend:
    build:
      context: ./ER_front2
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    environment:
      PORT: 3000
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deployment/aws/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
