spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ER_server
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/er_search_character?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: never
    include-message: always

external-api:
  base-url: ${BSER_API_BASE_URL:https://open-api.bser.io}
  api-key: ${BSER_API_KEY:}
  user-lookup-path: ${BSER_USER_LOOKUP_PATH:/v1/user/nickname}
  player-stat-path: ${BSER_PLAYER_STAT_PATH:/v2/user/stats/uid}
  season-id: ${BSER_SEASON_ID:37}
  matching-mode: ${BSER_MATCHING_MODE:3}

predict-api:
  base-url: ${PREDICT_API_BASE_URL:http://127.0.0.1:8000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  features:
    enable-highest-rank-model-predict: ${APP_ENABLE_HIGHEST_RANK_MODEL_PREDICT:false}
